<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect fill="#1A1A1A" width="400" height="300"/>
  <g transform="translate(200,140)">
    <!-- Sierra circular -->
    <rect x="-40" y="-5" width="60" height="30" rx="4" fill="#FF6600"/>
    <circle cx="25" cy="10" r="35" fill="none" stroke="#888" stroke-width="4"/>
    <circle cx="25" cy="10" r="5" fill="#FF6600"/>
    <line x1="25" y1="-25" x2="25" y2="45" stroke="#888" stroke-width="2"/>
    <line x1="-10" y1="10" x2="60" y2="10" stroke="#888" stroke-width="2"/>
  </g>
  <text x="200" y="250" text-anchor="middle" fill="#666" font-family="Arial" font-size="14">Sierra Circular</text>
</svg>
